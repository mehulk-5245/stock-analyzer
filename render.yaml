services:
  - type: web
    name: stock-analyzer
    runtime: python
    rootDir: stock-analyzer
    buildCommand: "bash build.sh && pip install -r requirements.txt"
    startCommand: "gunicorn backend.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
